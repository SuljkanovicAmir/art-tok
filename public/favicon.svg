<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark rounded background -->
  <rect width="32" height="32" rx="6" fill="#050505"/>
  <!-- Outer frame -->
  <rect x="5" y="5" width="22" height="22" rx="1.5" fill="none" stroke="#f5f5f5" stroke-width="1.5"/>
  <!-- Inner frame border -->
  <rect x="8" y="8" width="16" height="16" rx="0.5" fill="none" stroke="#f5f5f5" stroke-opacity="0.35" stroke-width="0.75"/>
  <!-- Minimalist landscape: mountain/horizon -->
  <path d="M9 20 L14 13 L17 16.5 L19 14.5 L23 20Z" fill="#f5f5f5" fill-opacity="0.8"/>
  <!-- Sun/circle -->
  <circle cx="20" cy="12" r="1.8" fill="#f5f5f5" fill-opacity="0.6"/>
</svg>
