name: Test Image Servers
on: workflow_dispatch

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test image server endpoints
        env:
          HARVARD_API_KEY: ${{ secrets.HARVARD_API_KEY }}
        run: |
          echo "=========================================="
          echo "  IMAGE SERVER DIAGNOSTICS FROM GH ACTIONS"
          echo "=========================================="
          echo ""

          echo "=== Runner IP ==="
          curl -s https://api.ipify.org
          echo ""

          echo ""
          echo "--- HARVARD ---"
          echo ""

          echo "=== 1a. ids.lib.harvard.edu — bare curl ==="
          CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://ids.lib.harvard.edu/ids/iiif/47174896/full/843,/0/default.jpg" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36")
          echo "  HTTP $CODE"

          echo "=== 1b. ids.lib — with Accept + full browser headers ==="
          CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://ids.lib.harvard.edu/ids/iiif/47174896/full/843,/0/default.jpg" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            -H "Accept: image/avif,image/webp,image/apng,image/svg+xml,image/*,*/*;q=0.8" \
            -H "Accept-Language: en-US,en;q=0.9" \
            -H "Referer: https://harvardartmuseums.org/" \
            -H "sec-ch-ua: \"Chromium\";v=\"120\"" \
            -H "sec-fetch-dest: image" \
            -H "sec-fetch-mode: no-cors" \
            -H "sec-fetch-site: cross-site")
          echo "  HTTP $CODE"

          echo "=== 1c. ids.lib — smaller image (200px) ==="
          CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://ids.lib.harvard.edu/ids/iiif/47174896/full/200,/0/default.jpg" \
            -H "User-Agent: Mozilla/5.0")
          echo "  HTTP $CODE"

          echo "=== 1d. ids.lib — no User-Agent at all ==="
          CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://ids.lib.harvard.edu/ids/iiif/47174896/full/843,/0/default.jpg")
          echo "  HTTP $CODE"

          echo "=== 1e. ids.lib — response headers on 429 ==="
          curl -s -I "https://ids.lib.harvard.edu/ids/iiif/47174896/full/843,/0/default.jpg" \
            -H "User-Agent: Mozilla/5.0" 2>&1 | head -15

          echo ""
          echo "--- AIC ---"
          echo ""

          echo "=== 2a. AIC — Referer + User-Agent ==="
          CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://www.artic.edu/iiif/2/e966799b-97ee-1cc6-bd2f-a94b4b8bb8f9/full/843,/0/default.jpg" \
            -H "Referer: https://www.artic.edu/" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36")
          echo "  HTTP $CODE"

          echo "=== 2b. AIC — full browser headers ==="
          CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://www.artic.edu/iiif/2/e966799b-97ee-1cc6-bd2f-a94b4b8bb8f9/full/843,/0/default.jpg" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            -H "Accept: image/avif,image/webp,image/apng,image/*,*/*;q=0.8" \
            -H "Accept-Language: en-US,en;q=0.9" \
            -H "Referer: https://www.artic.edu/" \
            -H "Origin: https://www.artic.edu" \
            -H "sec-ch-ua: \"Chromium\";v=\"120\"" \
            -H "sec-fetch-dest: image" \
            -H "sec-fetch-mode: cors" \
            -H "sec-fetch-site: same-origin")
          echo "  HTTP $CODE"

          echo "=== 2c. AIC — response headers on 403 ==="
          curl -s -I "https://www.artic.edu/iiif/2/e966799b-97ee-1cc6-bd2f-a94b4b8bb8f9/full/843,/0/default.jpg" \
            -H "Referer: https://www.artic.edu/" \
            -H "User-Agent: Mozilla/5.0" 2>&1 | head -15

          echo ""
          echo "--- MET ---"
          echo ""

          echo "=== 3a. Met — via API (real URL) ==="
          MET_ID=$(curl -s "https://collectionapi.metmuseum.org/public/collection/v1/objects/436535" | node -e "
            process.stdin.setEncoding('utf8');let d='';
            process.stdin.on('data',c=>d+=c);
            process.stdin.on('end',()=>{const o=JSON.parse(d);console.log(o.primaryImage||'NONE')});
          ")
          echo "  Image URL: $MET_ID"
          if [ "$MET_ID" != "NONE" ]; then
            CODE=$(curl -s -o /dev/null -w "%{http_code}" "$MET_ID" -H "User-Agent: Mozilla/5.0")
            echo "  HTTP $CODE"
          fi

          echo ""
          echo "--- CLOUDFLARE PROXY TEST ---"
          echo ""

          echo "=== 4a. Harvard via allorigins (CF-based CORS proxy) ==="
          ENCODED=$(node -e "console.log(encodeURIComponent('https://ids.lib.harvard.edu/ids/iiif/47174896/full/843,/0/default.jpg'))")
          CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://api.allorigins.win/raw?url=${ENCODED}")
          echo "  HTTP $CODE"

          echo "=== 4b. AIC via allorigins (CF-based CORS proxy) ==="
          ENCODED=$(node -e "console.log(encodeURIComponent('https://www.artic.edu/iiif/2/e966799b-97ee-1cc6-bd2f-a94b4b8bb8f9/full/843,/0/default.jpg'))")
          CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://api.allorigins.win/raw?url=${ENCODED}")
          echo "  HTTP $CODE"

          echo "=== 4c. Harvard via corsproxy.io ==="
          CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://corsproxy.io/?https://ids.lib.harvard.edu/ids/iiif/47174896/full/843,/0/default.jpg")
          echo "  HTTP $CODE"

          echo "=== 4d. AIC via corsproxy.io ==="
          CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://corsproxy.io/?https://www.artic.edu/iiif/2/e966799b-97ee-1cc6-bd2f-a94b4b8bb8f9/full/843,/0/default.jpg")
          echo "  HTTP $CODE"

          echo ""
          echo "=========================================="
          echo "  DONE"
          echo "=========================================="
